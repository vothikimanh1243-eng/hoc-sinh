<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Học Tập & Mô Phỏng Khoa Học</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* style.css - Giao diện Cổng Học Tập */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f6;
    color: #333;
    margin: 0;
    padding: 0;
}

header {
    background: #0b2246;
    color: #fff;
    padding: 25px 20px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
}

header h1 {
    margin: 0;
    font-size: 24px;
    letter-spacing: 1px;
}

header p {
    margin: 5px 0 0 0;
    color: #8ab4f8;
    font-size: 14px;
}

main {
    padding: 30px 20px;
    max-width: 900px;
    margin: 0 auto;
}

h2 {
    color: #0b2246;
    font-size: 20px;
    border-bottom: 2px solid #00f3ff;
    padding-bottom: 8px;
}

/* Khung chứa các công cụ học tập */
#toolList {
    margin-top: 20px;
    display: grid;
    gap: 15px;
}

/* Thẻ card cho từng công cụ */
.tool-card {
    background: #ffffff;
    border: 1px solid #e0e0e0;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.tool-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
}

.tool-card h3 {
    margin-top: 0;
    color: #0b2246;
    font-size: 18px;
}

.tool-card p {
    color: #555;
    font-size: 14px;
    line-height: 1.5;
}

/* Nút truy cập */
.btn-access {
    background: #0b2246;
    color: #00f3ff;
    padding: 8px 16px;
    text-decoration: none;
    display: inline-block;
    margin-top: 12px;
    font-weight: bold;
    border-radius: 4px;
    border: 1px solid #00f3ff;
    transition: all 0.2s ease;
}

.btn-access:hover {
    background: #00f3ff;
    color: #000;
    box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
}
        
/* Cấu trúc lại Header để logo và chữ dính liền và nằm đúng vị trí */
header {
    background: #0b2246;
    color: #fff;
    padding: 20px;
    text-align: left; /* Đổi về căn trái hoặc căn giữa tùy ý */
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
}

.header-content {
    display: flex;
    align-items: center;
    justify-content: center; /* Đưa toàn bộ cụm logo + chữ ra giữa trang */
    gap: 20px;               /* Khoảng cách giữa logo và chữ */
    max-width: 900px;
    margin: 0 auto;
}

/* Khung logo kích thước 90px như ý bạn */
.site-logo {
    background: rgba(0, 243, 255, 0.1);
    border: 3px solid #00f3ff;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
    overflow: hidden;
    flex-shrink: 0;
}

.logo-img {
    width: 85%;
    height: 85%;
    object-fit: contain;
}
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <!-- LOGO HỆ THỐNG -->
            <div class="site-logo">
                <img src="logo-dark-removebg-preview.png" alt="Logo Trường/Hệ Thống" class="logo-img">
            </div>
            <div>
                <h1>CỔNG DỤNG CỤ HỌC TẬP & MÔ PHỎNG</h1>
                <p>Hệ thống thực hành trực tuyến dành cho học sinh</p>
            </div>
        </div>
    </header>

    <main>
        <h2>Danh sách công cụ & bài thực hành:</h2>
        
        <div id="toolList">
            <!-- Thẻ bài tập mẫu -->
            <div class="tool-card">
                <h3>Mô Phỏng Lò Phản Ứng Tokamak MK-VII</h3>
                <p>Khám phá plasma, hệ thống từ trường và vận hành lò phản ứng tổng hợp hạt nhân an toàn.</p>
                <a href="tokamak.html" class="btn-access">Truy cập ngay</a>
            </div>
        </div>
    </main>
</body>
</html>
