<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Học Tập & Mô Phỏng Khoa Học</title>
    <link rel="stylesheet" href="style.css">
    <style>
.site-logo {
    background: rgba(0, 243, 255, 0.1);
    border: 2px solid #00f3ff;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
    overflow: hidden; /* Giúp ảnh không bị tràn ra ngoài khung tròn */
}

/* Định dạng kích thước file ảnh logo của bạn */
.logo-img {
    width: 80%;
    height: 80%;
    object-fit: contain; /* Giúp logo giữ nguyên tỉ lệ không bị méo */
}
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <!-- LOGO HỆ THỐNG -->
            <div class="site-logo">
                <img src="logo-dark-removebg-preview.png" alt="Logo Trường/Hệ Thống" class="logo-img">
            </div>
            <div>
                <h1>CỔNG DỤNG CỤ HỌC TẬP & MÔ PHỎNG</h1>
                <p>Hệ thống thực hành trực tuyến dành cho học sinh</p>
            </div>
        </div>
    </header>

    <main>
        <h2>Danh sách công cụ & bài thực hành:</h2>
        
        <div id="toolList">
            <!-- Thẻ bài tập mẫu -->
            <div class="tool-card">
                <h3>Mô Phỏng Lò Phản Ứng Tokamak MK-VII</h3>
                <p>Khám phá plasma, hệ thống từ trường và vận hành lò phản ứng tổng hợp hạt nhân an toàn.</p>
                <a href="tokamak.html" class="btn-access">Truy cập ngay</a>
            </div>
        </div>
    </main>
</body>
</html>
