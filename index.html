<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Quản Trị Admin - Cổng Học Tập</title>
    <style>
      body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f6;
    color: #333;
    margin: 0;
    padding: 0;
}

header {
    background: #0b2246;
    color: #fff;
    padding: 25px 20px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
}

header h1 {
    margin: 0;
    font-size: 24px;
    letter-spacing: 1px;
}

header p {
    margin: 5px 0 0 0;
    color: #8ab4f8;
    font-size: 14px;
}

main {
    padding: 30px 20px;
    max-width: 900px;
    margin: 0 auto;
}

h2 {
    color: #0b2246;
    font-size: 20px;
    border-bottom: 2px solid #00f3ff;
    padding-bottom: 8px;
}

/* Khung chứa các công cụ học tập */
#toolList {
    margin-top: 20px;
    display: grid;
    gap: 15px;
}

/* Thẻ card cho từng công cụ */
.tool-card {
    background: #ffffff;
    border: 1px solid #e0e0e0;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.tool-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
}

.tool-card h3 {
    margin-top: 0;
    color: #0b2246;
    font-size: 18px;
}

.tool-card p {
    color: #555;
    font-size: 14px;
    line-height: 1.5;
}

/* Nút truy cập */
.btn-access {
    background: #0b2246;
    color: #00f3ff;
    padding: 8px 16px;
    text-decoration: none;
    display: inline-block;
    margin-top: 12px;
    font-weight: bold;
    border-radius: 4px;
    border: 1px solid #00f3ff;
    transition: all 0.2s ease;
}

.btn-access:hover {
    background: #00f3ff;
    color: #000;
    box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
}
        
/* Cấu trúc lại Header để logo và chữ dính liền và nằm đúng vị trí */
header {
    background: #0b2246;
    color: #fff;
    padding: 20px;
    text-align: left; /* Đổi về căn trái hoặc căn giữa tùy ý */
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
}

.header-content {
    display: flex;
    align-items: center;
    justify-content: center; /* Đưa toàn bộ cụm logo + chữ ra giữa trang */
    gap: 20px;               /* Khoảng cách giữa logo và chữ */
    max-width: 900px;
    margin: 0 auto;
}

/* Khung logo kích thước 90px như ý bạn */
.site-logo {
    background: rgba(0, 243, 255, 0.1);
    border: 3px solid #00f3ff;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
    overflow: hidden;
    flex-shrink: 0;
}

.logo-img {
    width: 85%;
    height: 85%;
    object-fit: contain;
}
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="logo-preview">
            <img src="logo-dark-removebg-preview.png" alt="Logo Trường/Hệ Thống" class="logo-img">
            <div>
                <h3 style="margin:0; font-size: 16px; color: #0b2246;">HỆ THỐNG ADMIN QUẢN TRỊ</h3>
                <span style="font-size: 12px; color: #555;">Quản lý nội dung học tập cho học sinh</span>
            </div>
        </div>

        <div class="admin-box">
            <h2>Thêm Công Cụ / Bài Test Mới</h2>
            <form id="addToolForm">
                <label><b>Tên dụng cụ / Bài test:</b></label>
                <input type="text" id="toolName" placeholder="Ví dụ: Mô phỏng hệ mặt trời" required>

                <label><b>Mô tả ngắn:</b></label>
                <textarea id="toolDesc" placeholder="Mô tả nội dung học tập..." rows="3" required></textarea>

                <label><b>Link liên kết (URL):</b></label>
                <input type="text" id="toolLink" placeholder="Ví dụ: tokamak.html" required>

                <button type="submit">Thêm Vào Cổng Học Tập</button>
            </form>
        </div>

        <div class="admin-box">
            <h2>Danh Sách Công Cụ Hiện Có</h2>
            <div id="adminToolList"></div>
        </div>
    </div>

    <script>
        // Lấy danh sách từ localStorage khi mở trang Admin
        function getTools() {
            let tools = JSON.parse(localStorage.getItem('adminTools'));
            if (!tools) {
                tools = [{
                    name: "Mô Phỏng Lò Phản Ứng Tokamak MK-VII",
                    desc: "Khám phá plasma, hệ thống từ trường và vận hành lò phản ứng tổng hợp hạt nhân an toàn.",
                    link: "tokamak.html"
                }];
                localStorage.setItem('adminTools', JSON.stringify(tools));
            }
            return tools;
        }

        // Hiển thị danh sách ở trang Admin
        function renderAdminList() {
            const listContainer = document.getElementById('adminToolList');
            const tools = getTools();
            listContainer.innerHTML = "";

            tools.forEach((tool, index) => {
                const item = document.createElement('div');
                item.className = 'manage-item';
                item.innerHTML = `
                    <div class="manage-info">
                        <h4>${tool.name}</h4>
                        <p>Link: ${tool.link} - <i>${tool.desc}</i></p>
                    </div>
                    <button class="btn-delete" onclick="deleteTool(${index})">Xóa</button>
                `;
                listContainer.appendChild(item);
            });
        }

        // Xử lý thêm công cụ mới
        document.getElementById('addToolForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('toolName').value;
            const desc = document.getElementById('toolDesc').value;
            const link = document.getElementById('toolLink').value;

            let tools = getTools();
            tools.push({ name, desc, link });
            localStorage.setItem('adminTools', JSON.stringify(tools));

            renderAdminList();
            alert("Đã thêm thành công và cập nhật lên trang học sinh!");
            this.reset();
        });

        // Hàm xóa công cụ
        function deleteTool(index) {
            if (confirm("Bạn có chắc chắn muốn xóa công cụ này không?")) {
                let tools = getTools();
                tools.splice(index, 1);
                localStorage.setItem('adminTools', JSON.stringify(tools));
                renderAdminList();
                alert("Đã xóa thành công!");
            }
        }

        renderAdminList();
    </script>
</body>
</html>
